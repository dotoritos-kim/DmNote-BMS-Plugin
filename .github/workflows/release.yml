name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'plugin/**'
      - 'scripts/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New tag ${TAG} will be created."
          fi

      - name: Skip if tag exists
        if: steps.version.outputs.exists == 'true'
        run: echo "Release v${{ steps.version.outputs.version }} already exists. Done."

      - uses: actions/setup-node@v4
        if: steps.version.outputs.exists == 'false'
        with:
          node-version: 22

      - name: Install bridge dependencies
        if: steps.version.outputs.exists == 'false'
        run: npm run install:bridge

      - name: Build release zip
        if: steps.version.outputs.exists == 'false'
        run: npm run release

      - name: Create tag and GitHub Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/*.zip
          generate_release_notes: true
